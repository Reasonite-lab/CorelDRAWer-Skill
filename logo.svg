<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e589a0"/><stop offset="100%" stop-color="#c16a80"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#adcca3"/><stop offset="100%" stop-color="#8aab7e"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a9b2a0"/><stop offset="100%" stop-color="#87907e"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b3b3b3"/><stop offset="100%" stop-color="#8a8a8a"/>
    </linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#595450"/><stop offset="100%" stop-color="#3a3632"/>
    </linearGradient>
    <linearGradient id="penGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c3e50"/><stop offset="100%" stop-color="#1a252f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e74c3c"/><stop offset="50%" stop-color="#e67e22"/><stop offset="100%" stop-color="#f39c12"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ===== Layer 5: Coal (bottom) — builds up with scaleY ===== -->
  <g transform="translate(30, 168)" filter="url(#shadow)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.4s" fill="freeze"/>
    <g>
      <animateTransform attributeName="transform" type="scale" from="1 0" to="1 1"
        begin="0.2s" dur="0.5s" fill="freeze" additive="sum"/>
      <animateTransform attributeName="transform" type="translate" from="0 28" to="0 0"
        begin="0.2s" dur="0.5s" fill="freeze" additive="sum"/>
    </g>
    <rect x="0" y="0" width="80" height="28" rx="3" fill="url(#g5)"/>
    <line x1="5" y1="9" x2="75" y2="9" stroke="#fff" stroke-width="0.8" opacity="0">
      <animate attributeName="opacity" from="0" to="0.5" begin="0.8s" dur="0.3s" fill="freeze"/>
    </line>
    <line x1="5" y1="18" x2="75" y2="18" stroke="#fff" stroke-width="0.8" opacity="0">
      <animate attributeName="opacity" from="0" to="0.5" begin="0.8s" dur="0.3s" fill="freeze"/>
    </line>
  </g>

  <!-- ===== Layer 4: Limestone ===== -->
  <g transform="translate(30, 136)" filter="url(#shadow)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.55s" dur="0.4s" fill="freeze"/>
    <g>
      <animateTransform attributeName="transform" type="scale" from="1 0" to="1 1"
        begin="0.55s" dur="0.5s" fill="freeze" additive="sum"/>
      <animateTransform attributeName="transform" type="translate" from="0 32" to="0 0"
        begin="0.55s" dur="0.5s" fill="freeze" additive="sum"/>
    </g>
    <rect x="0" y="0" width="80" height="32" rx="2" fill="url(#g4)"/>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="0.5" begin="1.1s" dur="0.3s" fill="freeze"/>
      <rect x="8" y="4" width="14" height="6" rx="1" fill="none" stroke="#777" stroke-width="0.4"/>
      <rect x="26" y="4" width="14" height="6" rx="1" fill="none" stroke="#777" stroke-width="0.4"/>
      <rect x="44" y="4" width="14" height="6" rx="1" fill="none" stroke="#777" stroke-width="0.4"/>
      <rect x="62" y="4" width="14" height="6" rx="1" fill="none" stroke="#777" stroke-width="0.4"/>
      <rect x="17" y="12" width="14" height="6" rx="1" fill="none" stroke="#777" stroke-width="0.4"/>
      <rect x="35" y="12" width="14" height="6" rx="1" fill="none" stroke="#777" stroke-width="0.4"/>
      <rect x="53" y="12" width="14" height="6" rx="1" fill="none" stroke="#777" stroke-width="0.4"/>
      <rect x="8" y="20" width="14" height="6" rx="1" fill="none" stroke="#777" stroke-width="0.4"/>
      <rect x="26" y="20" width="14" height="6" rx="1" fill="none" stroke="#777" stroke-width="0.4"/>
      <rect x="44" y="20" width="14" height="6" rx="1" fill="none" stroke="#777" stroke-width="0.4"/>
    </g>
  </g>

  <!-- ===== Layer 3: Conglomerate ===== -->
  <g transform="translate(30, 112)" filter="url(#shadow)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.4s" fill="freeze"/>
    <g>
      <animateTransform attributeName="transform" type="scale" from="1 0" to="1 1"
        begin="0.9s" dur="0.5s" fill="freeze" additive="sum"/>
      <animateTransform attributeName="transform" type="translate" from="0 24" to="0 0"
        begin="0.9s" dur="0.5s" fill="freeze" additive="sum"/>
    </g>
    <rect x="0" y="0" width="80" height="24" rx="2" fill="url(#g2)"/>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="0.6" begin="1.4s" dur="0.3s" fill="freeze"/>
      <circle cx="20" cy="8" r="4" fill="none" stroke="#5a7a4e" stroke-width="0.7"/>
      <circle cx="40" cy="14" r="3" fill="none" stroke="#5a7a4e" stroke-width="0.7"/>
      <circle cx="60" cy="7" r="3.5" fill="none" stroke="#5a7a4e" stroke-width="0.7"/>
      <circle cx="15" cy="18" r="2" fill="#5a7a4e"/>
      <circle cx="50" cy="19" r="2.5" fill="#5a7a4e"/>
      <circle cx="70" cy="16" r="2" fill="#5a7a4e"/>
    </g>
  </g>

  <!-- ===== Layer 2: Dolomite ===== -->
  <g transform="translate(30, 86)" filter="url(#shadow)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.25s" dur="0.4s" fill="freeze"/>
    <g>
      <animateTransform attributeName="transform" type="scale" from="1 0" to="1 1"
        begin="1.25s" dur="0.5s" fill="freeze" additive="sum"/>
      <animateTransform attributeName="transform" type="translate" from="0 26" to="0 0"
        begin="1.25s" dur="0.5s" fill="freeze" additive="sum"/>
    </g>
    <rect x="0" y="0" width="80" height="26" rx="2" fill="url(#g3)"/>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="0.5" begin="1.8s" dur="0.3s" fill="freeze"/>
      <line x1="0" y1="0" x2="26" y2="26" stroke="#6a7a60" stroke-width="0.5"/>
      <line x1="13" y1="0" x2="39" y2="26" stroke="#6a7a60" stroke-width="0.5"/>
      <line x1="26" y1="0" x2="52" y2="26" stroke="#6a7a60" stroke-width="0.5"/>
      <line x1="39" y1="0" x2="65" y2="26" stroke="#6a7a60" stroke-width="0.5"/>
      <line x1="52" y1="0" x2="78" y2="26" stroke="#6a7a60" stroke-width="0.5"/>
      <line x1="0" y1="26" x2="26" y2="0" stroke="#6a7a60" stroke-width="0.5"/>
      <line x1="13" y1="26" x2="39" y2="0" stroke="#6a7a60" stroke-width="0.5"/>
      <line x1="26" y1="26" x2="52" y2="0" stroke="#6a7a60" stroke-width="0.5"/>
      <line x1="39" y1="26" x2="65" y2="0" stroke="#6a7a60" stroke-width="0.5"/>
      <line x1="52" y1="26" x2="78" y2="0" stroke="#6a7a60" stroke-width="0.5"/>
    </g>
  </g>

  <!-- ===== Layer 1: Sandstone ===== -->
  <g transform="translate(30, 56)" filter="url(#shadow)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.4s" fill="freeze"/>
    <g>
      <animateTransform attributeName="transform" type="scale" from="1 0" to="1 1"
        begin="1.6s" dur="0.5s" fill="freeze" additive="sum"/>
      <animateTransform attributeName="transform" type="translate" from="0 30" to="0 0"
        begin="1.6s" dur="0.5s" fill="freeze" additive="sum"/>
    </g>
    <rect x="0" y="0" width="80" height="30" rx="2" fill="url(#g1)"/>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="0.5" begin="2.1s" dur="0.4s" fill="freeze"/>
      <circle cx="8" cy="8" r="0.6" fill="#8a3040"/>
      <circle cx="14" cy="6" r="0.6" fill="#8a3040"/>
      <circle cx="20" cy="10" r="0.6" fill="#8a3040"/>
      <circle cx="26" cy="7" r="0.6" fill="#8a3040"/>
      <circle cx="32" cy="12" r="0.6" fill="#8a3040"/>
      <circle cx="38" cy="8" r="0.6" fill="#8a3040"/>
      <circle cx="44" cy="11" r="0.6" fill="#8a3040"/>
      <circle cx="50" cy="6" r="0.6" fill="#8a3040"/>
      <circle cx="56" cy="9" r="0.6" fill="#8a3040"/>
      <circle cx="62" cy="13" r="0.6" fill="#8a3040"/>
      <circle cx="68" cy="7" r="0.6" fill="#8a3040"/>
      <circle cx="74" cy="10" r="0.6" fill="#8a3040"/>
      <circle cx="11" cy="18" r="0.6" fill="#8a3040"/>
      <circle cx="17" cy="22" r="0.6" fill="#8a3040"/>
      <circle cx="23" cy="19" r="0.6" fill="#8a3040"/>
      <circle cx="29" cy="24" r="0.6" fill="#8a3040"/>
      <circle cx="35" cy="18" r="0.6" fill="#8a3040"/>
      <circle cx="41" cy="25" r="0.6" fill="#8a3040"/>
      <circle cx="47" cy="20" r="0.6" fill="#8a3040"/>
      <circle cx="53" cy="23" r="0.6" fill="#8a3040"/>
      <circle cx="59" cy="17" r="0.6" fill="#8a3040"/>
      <circle cx="65" cy="21" r="0.6" fill="#8a3040"/>
      <circle cx="71" cy="19" r="0.6" fill="#8a3040"/>
    </g>
  </g>

  <!-- ===== Fossil (appears after sandstone) ===== -->
  <text x="85" y="85" font-size="14" fill="#8a3040" opacity="0" filter="url(#glow)">
    🦞
    <animate attributeName="opacity" from="0" to="0.7" begin="2.3s" dur="0.5s" fill="freeze"/>
    <animateTransform attributeName="transform" type="scale" from="0.5" to="1.2"
      begin="2.3s" dur="0.3s" fill="freeze" additive="sum"/>
    <animateTransform attributeName="transform" type="scale" from="1.2" to="1"
      begin="2.6s" dur="0.2s" fill="freeze" additive="sum"/>
  </text>

  <!-- ===== Unconformity line (draws itself) ===== -->
  <polyline points="30,86 40,81 50,86 60,81 70,86 80,81 90,86 100,81 110,86"
    fill="none" stroke="#e74c3c" stroke-width="0.8"
    stroke-dasharray="200" stroke-dashoffset="200" opacity="0">
    <animate attributeName="stroke-dashoffset" from="200" to="0"
      begin="2.1s" dur="0.6s" fill="freeze"/>
    <animate attributeName="opacity" from="0" to="0.85" begin="2.1s" dur="0.1s" fill="freeze"/>
  </polyline>

  <!-- ===== Drawing Pen (slides in) ===== -->
  <g transform="translate(105, 46) rotate(55)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.5s" dur="0.4s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate"
      from="40 -20" to="0 0" begin="2.5s" dur="0.6s" fill="freeze" additive="sum"/>
    <!-- Pen body -->
    <rect x="-2" y="0" width="4" height="90" rx="2" fill="url(#penGrad)">
      <animate attributeName="height" from="0" to="90" begin="2.5s" dur="0.5s" fill="freeze"/>
    </rect>
    <!-- Pen tip -->
    <polygon points="-2,90 2,90 0,105" fill="#1a252f" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.2s" fill="freeze"/>
    </polygon>
    <!-- Nib -->
    <line x1="0" y1="90" x2="0" y2="102" stroke="#e74c3c" stroke-width="0.5" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.2s" fill="freeze"/>
    </line>
    <!-- Cap bands -->
    <rect x="-2.5" y="0" width="5" height="6" rx="1" fill="#e74c3c" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.7s" dur="0.2s" fill="freeze"/>
    </rect>
    <rect x="-2.5" y="10" width="5" height="3" rx="1" fill="#e67e22" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.2s" fill="freeze"/>
    </rect>
  </g>

  <!-- ===== Text Mark ===== -->
  <g transform="translate(140, 50)">
    <!-- Main title: fade in letter by letter feel with clip-path reveal -->
    <text x="0" y="45" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-size="42" font-weight="900" letter-spacing="-1" fill="#2c3e50" opacity="0">
      Corel<tspan fill="url(#accent)">DRAW</tspan>er
      <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.6s" fill="freeze"/>
    </text>

    <!-- Subtitle -->
    <text x="2" y="72" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-size="13" font-weight="500" letter-spacing="4" fill="#7f8c8d" opacity="0">
      GEOLOGICAL DIAGRAM SKILL
      <animate attributeName="opacity" from="0" to="1" begin="3.3s" dur="0.5s" fill="freeze"/>
    </text>

    <!-- Tagline -->
    <text x="2" y="95" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-size="11" font-weight="400" letter-spacing="1" fill="#95a5a6" opacity="0">
      Describe it. We draw it. Drag into CorelDRAW.
      <animate attributeName="opacity" from="0" to="1" begin="3.6s" dur="0.5s" fill="freeze"/>
    </text>

    <!-- Accent line grows from left -->
    <line x1="0" y1="58" x2="120" y2="58" stroke="url(#accent)" stroke-width="2.5"
          stroke-linecap="round" stroke-dasharray="120" stroke-dashoffset="120" opacity="0">
      <animate attributeName="stroke-dashoffset" from="120" to="0"
        begin="3.2s" dur="0.5s" fill="freeze"/>
      <animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.1s" fill="freeze"/>
    </line>
  </g>

  <!-- ===== Bottom strata line (fades in) ===== -->
  <g transform="translate(0, 185)" opacity="0">
    <animate attributeName="opacity" from="0" to="0.15" begin="3.8s" dur="0.8s" fill="freeze"/>
    <rect x="0" y="0" width="80" height="4" fill="#e589a0" rx="1"/>
    <rect x="75" y="4" width="90" height="3" fill="#adcca3" rx="1"/>
    <rect x="160" y="7" width="110" height="2" fill="#a9b2a0" rx="1"/>
    <rect x="265" y="9" width="140" height="3" fill="#b3b3b3" rx="1"/>
    <rect x="400" y="12" width="200" height="4" fill="#595450" rx="1"/>
  </g>

  <!-- ===== Pulse dot on the "i" of "Skill" (subtle) ===== -->
  <circle cx="358" cy="67" r="2.5" fill="url(#accent)" opacity="0">
    <animate attributeName="opacity" values="0;1;0.3;1;0" dur="3s" begin="4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;3.5;2" dur="3s" begin="4s" repeatCount="indefinite"/>
  </circle>
</svg>
