name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: python3 tests/test_generators.py

      - name: Verify CLI
        run: |
          python3 coreldrawer.py --help
          python3 coreldrawer.py column /tmp/test_col.svg
          python3 coreldrawer.py xsection /tmp/test_xsec.svg
          python3 coreldrawer.py vba /tmp/test_macro.bas

      - name: Verify SVG output
        run: |
          python3 -c "
          with open('/tmp/test_col.svg') as f:
              c = f.read()
              assert '<svg' in c
              assert 'cdr-background' in c
              assert 'cdr-body' in c
          print('Column SVG valid')
          with open('/tmp/test_xsec.svg') as f:
              c = f.read()
              assert '<svg' in c
              assert 'surface-line' in c
          print('Cross-section SVG valid')
          "
