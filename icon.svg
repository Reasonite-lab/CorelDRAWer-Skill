<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a252f"/><stop offset="100%" stop-color="#2c3e50"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e74c3c"/><stop offset="50%" stop-color="#e67e22"/>
    </linearGradient>
  </defs>

  <!-- Background circle with subtle pulse -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)">
    <animate attributeName="r" values="120;122;120" dur="4s" begin="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Stratified column -->
  <g transform="translate(78, 58)">
    <!-- Layer 5 -->
    <rect x="20" y="112" width="60" height="22" rx="3" fill="#595450" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.3s" fill="freeze"/>
    </rect>
    <line x1="24" y1="120" x2="76" y2="120" stroke="#fff" stroke-width="0.8" opacity="0">
      <animate attributeName="opacity" from="0" to="0.4" begin="0.6s" dur="0.3s" fill="freeze"/>
    </line>
    <!-- Layer 4 -->
    <rect x="20" y="84" width="60" height="28" rx="3" fill="#b3b3b3" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.35s" dur="0.3s" fill="freeze"/>
    </rect>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="0.6" begin="0.7s" dur="0.3s" fill="freeze"/>
      <rect x="26" y="89" width="10" height="5" rx="1" fill="none" stroke="#888" stroke-width="0.5"/>
      <rect x="40" y="89" width="10" height="5" rx="1" fill="none" stroke="#888" stroke-width="0.5"/>
      <rect x="54" y="89" width="10" height="5" rx="1" fill="none" stroke="#888" stroke-width="0.5"/>
      <rect x="33" y="98" width="10" height="5" rx="1" fill="none" stroke="#888" stroke-width="0.5"/>
      <rect x="47" y="98" width="10" height="5" rx="1" fill="none" stroke="#888" stroke-width="0.5"/>
    </g>
    <!-- Layer 3 -->
    <rect x="20" y="62" width="60" height="22" rx="3" fill="#adcca3" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.3s" fill="freeze"/>
    </rect>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="0.7" begin="0.85s" dur="0.3s" fill="freeze"/>
      <circle cx="35" cy="69" r="3.5" fill="none" stroke="#5a7a4e" stroke-width="0.6"/>
      <circle cx="52" cy="74" r="3" fill="none" stroke="#5a7a4e" stroke-width="0.6"/>
      <circle cx="68" cy="68" r="3" fill="#5a7a4e"/>
    </g>
    <!-- Layer 2 -->
    <rect x="20" y="36" width="60" height="26" rx="3" fill="#a9b2a0" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.65s" dur="0.3s" fill="freeze"/>
    </rect>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="0.5" begin="1.0s" dur="0.3s" fill="freeze"/>
      <line x1="20" y1="36" x2="46" y2="62" stroke="#6a7a60" stroke-width="0.5"/>
      <line x1="33" y1="36" x2="59" y2="62" stroke="#6a7a60" stroke-width="0.5"/>
      <line x1="46" y1="36" x2="72" y2="62" stroke="#6a7a60" stroke-width="0.5"/>
      <line x1="20" y1="62" x2="46" y2="36" stroke="#6a7a60" stroke-width="0.5"/>
      <line x1="33" y1="62" x2="59" y2="36" stroke="#6a7a60" stroke-width="0.5"/>
      <line x1="46" y1="62" x2="72" y2="36" stroke="#6a7a60" stroke-width="0.5"/>
    </g>
    <!-- Layer 1 -->
    <rect x="20" y="8" width="60" height="28" rx="3" fill="#e589a0" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.3s" fill="freeze"/>
    </rect>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="0.6" begin="1.15s" dur="0.3s" fill="freeze"/>
      <circle cx="28" cy="17" r="1.2" fill="#8a3040"/><circle cx="35" cy="15" r="1.2" fill="#8a3040"/>
      <circle cx="42" cy="20" r="1.2" fill="#8a3040"/><circle cx="49" cy="16" r="1.2" fill="#8a3040"/>
      <circle cx="56" cy="22" r="1.2" fill="#8a3040"/><circle cx="63" cy="14" r="1.2" fill="#8a3040"/>
      <circle cx="70" cy="19" r="1.2" fill="#8a3040"/>
      <circle cx="31" cy="27" r="1.2" fill="#8a3040"/><circle cx="38" cy="30" r="1.2" fill="#8a3040"/>
      <circle cx="45" cy="26" r="1.2" fill="#8a3040"/><circle cx="52" cy="31" r="1.2" fill="#8a3040"/>
      <circle cx="59" cy="27" r="1.2" fill="#8a3040"/>
    </g>
    <!-- Unconformity -->
    <polyline points="20,36 30,32 40,36 50,32 60,36 70,32 80,36"
      fill="none" stroke="#e74c3c" stroke-width="0.8" stroke-dasharray="100" stroke-dashoffset="100" opacity="0">
      <animate attributeName="stroke-dashoffset" from="100" to="0" begin="1.2s" dur="0.5s" fill="freeze"/>
      <animate attributeName="opacity" from="0" to="0.9" begin="1.2s" dur="0.1s" fill="freeze"/>
    </polyline>
  </g>

  <!-- Drawing pen -->
  <g transform="translate(148, 48) rotate(60)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.4s" fill="freeze"/>
    <rect x="-2.5" y="0" width="5" height="65" rx="2" fill="#ecf0f1">
      <animate attributeName="height" from="0" to="65" begin="1.4s" dur="0.4s" fill="freeze"/>
    </rect>
    <polygon points="-2.5,65 2.5,65 0,80" fill="#ecf0f1" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.2s" fill="freeze"/>
    </polygon>
    <line x1="0" y1="65" x2="0" y2="78" stroke="#e74c3c" stroke-width="0.8" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.2s" fill="freeze"/>
    </line>
    <rect x="-3" y="0" width="6" height="6" rx="1.5" fill="url(#accent)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.2s" fill="freeze"/>
    </rect>
    <rect x="-3" y="9" width="6" height="3" rx="1" fill="#e67e22" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.7s" dur="0.2s" fill="freeze"/>
    </rect>
  </g>

  <!-- Text -->
  <text x="128" y="210" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="22" font-weight="900" letter-spacing="4" fill="#ecf0f1" text-anchor="middle" opacity="0">
    CorelDRAWer
    <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.6s" fill="freeze"/>
  </text>

  <!-- Bottom bar -->
  <rect x="78" y="222" width="100" height="2.5" rx="1" fill="url(#accent)"
        stroke-dasharray="100" stroke-dashoffset="100" opacity="0">
    <animate attributeName="stroke-dashoffset" from="100" to="0" begin="2.0s" dur="0.5s" fill="freeze"/>
    <animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.1s" fill="freeze"/>
  </rect>

  <!-- Subtle rotating ring (outer orbit) -->
  <circle cx="128" cy="128" r="115" fill="none" stroke="#e74c3c" stroke-width="0.5" opacity="0"
          stroke-dasharray="30 690">
    <animate attributeName="opacity" from="0" to="0.3" begin="2.5s" dur="0.5s" fill="freeze"/>
    <animateTransform attributeName="transform" type="rotate" from="0 128 128" to="360 128 128"
      dur="20s" begin="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>
