<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a252f"/>
      <stop offset="100%" stop-color="#2c3e50"/>
    </linearGradient>
    <linearGradient id="layers" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e589a0"/>
      <stop offset="20%" stop-color="#e589a0"/>
      <stop offset="20%" stop-color="#adcca3"/>
      <stop offset="40%" stop-color="#adcca3"/>
      <stop offset="40%" stop-color="#a9b2a0"/>
      <stop offset="60%" stop-color="#a9b2a0"/>
      <stop offset="60%" stop-color="#b3b3b3"/>
      <stop offset="80%" stop-color="#b3b3b3"/>
      <stop offset="80%" stop-color="#595450"/>
      <stop offset="100%" stop-color="#595450"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="50%" stop-color="#e67e22"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)"/>

  <!-- Stylized stratigraphic column — "C" shape -->
  <g transform="translate(78, 58)">
    <!-- Layer 5: dark -->
    <rect x="20" y="112" width="60" height="22" rx="3" fill="#595450"/>
    <line x1="24" y1="120" x2="76" y2="120" stroke="#fff" stroke-width="0.8" opacity="0.4"/>
    <!-- Layer 4: gray -->
    <rect x="20" y="84" width="60" height="28" rx="3" fill="#b3b3b3"/>
    <rect x="26" y="89" width="10" height="5" rx="1" fill="none" stroke="#888" stroke-width="0.5" opacity="0.6"/>
    <rect x="40" y="89" width="10" height="5" rx="1" fill="none" stroke="#888" stroke-width="0.5" opacity="0.6"/>
    <rect x="54" y="89" width="10" height="5" rx="1" fill="none" stroke="#888" stroke-width="0.5" opacity="0.6"/>
    <rect x="33" y="98" width="10" height="5" rx="1" fill="none" stroke="#888" stroke-width="0.5" opacity="0.6"/>
    <rect x="47" y="98" width="10" height="5" rx="1" fill="none" stroke="#888" stroke-width="0.5" opacity="0.6"/>
    <!-- Layer 3: green -->
    <rect x="20" y="62" width="60" height="22" rx="3" fill="#adcca3"/>
    <circle cx="35" cy="69" r="3.5" fill="none" stroke="#5a7a4e" stroke-width="0.6" opacity="0.7"/>
    <circle cx="52" cy="74" r="3" fill="none" stroke="#5a7a4e" stroke-width="0.6" opacity="0.7"/>
    <circle cx="68" cy="68" r="3" fill="#5a7a4e" opacity="0.4"/>
    <!-- Layer 2: dolomite -->
    <rect x="20" y="36" width="60" height="26" rx="3" fill="#a9b2a0"/>
    <line x1="20" y1="36" x2="46" y2="62" stroke="#6a7a60" stroke-width="0.5" opacity="0.5"/>
    <line x1="33" y1="36" x2="59" y2="62" stroke="#6a7a60" stroke-width="0.5" opacity="0.5"/>
    <line x1="46" y1="36" x2="72" y2="62" stroke="#6a7a60" stroke-width="0.5" opacity="0.5"/>
    <line x1="20" y1="62" x2="46" y2="36" stroke="#6a7a60" stroke-width="0.5" opacity="0.5"/>
    <line x1="33" y1="62" x2="59" y2="36" stroke="#6a7a60" stroke-width="0.5" opacity="0.5"/>
    <line x1="46" y1="62" x2="72" y2="36" stroke="#6a7a60" stroke-width="0.5" opacity="0.5"/>
    <!-- Layer 1: red -->
    <rect x="20" y="8" width="60" height="28" rx="3" fill="#e589a0"/>
    <circle cx="28" cy="17" r="1.2" fill="#8a3040" opacity="0.6"/>
    <circle cx="35" cy="15" r="1.2" fill="#8a3040" opacity="0.6"/>
    <circle cx="42" cy="20" r="1.2" fill="#8a3040" opacity="0.6"/>
    <circle cx="49" cy="16" r="1.2" fill="#8a3040" opacity="0.6"/>
    <circle cx="56" cy="22" r="1.2" fill="#8a3040" opacity="0.6"/>
    <circle cx="63" cy="14" r="1.2" fill="#8a3040" opacity="0.6"/>
    <circle cx="70" cy="19" r="1.2" fill="#8a3040" opacity="0.6"/>
    <circle cx="31" cy="27" r="1.2" fill="#8a3040" opacity="0.6"/>
    <circle cx="38" cy="30" r="1.2" fill="#8a3040" opacity="0.6"/>
    <circle cx="45" cy="26" r="1.2" fill="#8a3040" opacity="0.6"/>
    <circle cx="52" cy="31" r="1.2" fill="#8a3040" opacity="0.6"/>
    <circle cx="59" cy="27" r="1.2" fill="#8a3040" opacity="0.6"/>

    <!-- Unconformity line -->
    <polyline points="20,36 30,32 40,36 50,32 60,36 70,32 80,36"
              fill="none" stroke="#e74c3c" stroke-width="0.8" opacity="0.9"/>
  </g>

  <!-- Drawing pen -->
  <g transform="translate(148, 48) rotate(60)">
    <rect x="-2.5" y="0" width="5" height="65" rx="2" fill="#ecf0f1"/>
    <polygon points="-2.5,65 2.5,65 0,80" fill="#ecf0f1"/>
    <line x1="0" y1="65" x2="0" y2="78" stroke="#e74c3c" stroke-width="0.8"/>
    <rect x="-3" y="0" width="6" height="6" rx="1.5" fill="url(#accent)"/>
    <rect x="-3" y="9" width="6" height="3" rx="1" fill="#e67e22"/>
  </g>

  <!-- "CD" monogram -->
  <text x="128" y="210" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="22" font-weight="900" letter-spacing="4" fill="#ecf0f1" text-anchor="middle">
    CorelDRAWer
  </text>

  <!-- Bottom accent bar -->
  <rect x="78" y="222" width="100" height="2.5" rx="1" fill="url(#accent)"/>
</svg>
